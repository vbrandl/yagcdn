version: 2
updates:
  - package-ecosystem: cargo
    directories:
      - "/backend"
      - "/time-cache"
    schedule:
      interval: daily
      time: "04:00"
    open-pull-requests-limit: 10
    assignees:
      - vbrandl
    labels:
      - dependencies
      - dependabot

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    assignees:
      - vbrandl
    labels:
      - dependabot
      - dependencies

  - package-ecosystem: "elm"
    directory: "/frontend"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    assignees:
      - vbrandl
    labels:
      - dependabot
      - dependencies

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: daily
      time: "04:00"
    open-pull-requests-limit: 10
    assignees:
      - vbrandl
    labels:
      - dependencies
      - dependabot
    groups:
      minor:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: "rust-toolchain"
    directories:
      - "/backend"
      - "/time-cache"
    schedule:
      interval: daily
      time: "04:00"
    open-pull-requests-limit: 10
    assignees:
      - vbrandl
    labels:
      - dependencies
      - dependabot
